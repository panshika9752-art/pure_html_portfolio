<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enquiry Form</title>
  </head>
  <body>

    <form action="" method="post" autocomplete="off">
      <fieldset>
        <legend><b>Enquiry Form</b></legend>
      Name :<input type="text" name="name" placeholder="Enter your name"/><br /><br />
      Adderss : <textarea name="address"></textarea><br /><br />
      Gender:
      <input type="radio" value="f" name="Gender" />Female
      <input type="radio" value="m" name="Gender" />male
      <input type="radio" value="o" name="Gender" />other<br /><br />
      Country:
      <select>
        <option>Select your country</option>
        <option>India</option>
        <option>USA</option>
        <option>UK</option>
        <option>Canada</option>
       </select>
       <br /><br />
        Hoobies:
        <input type="checkbox" value="reading" name="hobby" />Reading
        <input type="checkbox" value="travelling" name="hobby" />Travelling
        <input type="checkbox" value="swimming" name="hobby" />Swimming
        <br /><br />
        Email:
        <input type="email" name="email" placeholder="Enter your email" required=""/><br><br />
        Password:
        <input type ="password" name="password" placeholder="Enter your password" required=""/><br><br />
        Date of Birth:
        <input type="date" name="dob" /><br /><br />
        Age :
        <input type="number" name="number" min ="1" max ="25" /><br /><br />
        Image:
        <input type="file" name="img" />
        <br /> <br />
      <input type="Submit" value="send" />
      <input type="Reset" value="reset" />
    </form>
  </body>
</html>
